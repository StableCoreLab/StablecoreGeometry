name: ci-windows-cmake

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tool versions
        shell: pwsh
        run: |
          cmake --version
          ctest --version

      - name: Configure (CMake preset)
        shell: pwsh
        run: cmake --preset vs2022-x64

      - name: Build (RelWithDebInfo)
        shell: pwsh
        run: cmake --build --preset vs2022-x64-build --config RelWithDebInfo

      - name: Test (CTest preset)
        shell: pwsh
        run: ctest --preset vs2022-x64-test -C RelWithDebInfo --output-on-failure
